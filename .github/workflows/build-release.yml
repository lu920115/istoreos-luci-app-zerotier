name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      zerotier_version:
        description: 'ZeroTier version to build (e.g. 1.16.2)'
        required: false
        default: ''

jobs:
  build-luci:
    name: Build LuCI Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          tar --zstd -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-* sdk

      - name: Setup feed and build
        run: |
          cd sdk
          ./scripts/feeds update base packages
          ./scripts/feeds install libncurses libpthread libstdcpp
          mkdir -p package/luci-app-zerotier
          cp -r $GITHUB_WORKSPACE/luci-app-zerotier/* package/luci-app-zerotier/
          make defconfig
          make package/luci-app-zerotier/compile V=s -j$(nproc)

      - name: Collect IPK
        run: |
          mkdir -p output
          find sdk/bin/packages -name 'luci-app-zerotier_*.ipk' -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-zerotier
          path: output/*.ipk

  build-zerotier:
    name: Build ZeroTier Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.zerotier_version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/rockchip/armv8/openwrt-sdk-24.10.4-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd

      - name: Download OpenWrt SDK
        run: |
          wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst || exit 1
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Clone OpenWrt packages feed
        run: |
          cd sdk
          ./scripts/feeds update packages
          ./scripts/feeds install zerotier

      - name: Update ZeroTier version
        run: |
          VER="${{ github.event.inputs.zerotier_version }}"
          SDK_FILE="sdk/feeds/packages/net/zerotier/Makefile"
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=$VER/" "$SDK_FILE"
          echo "Updated ZeroTier to $VER"
          grep "PKG_VERSION" "$SDK_FILE" || true

      - name: Compile ZeroTier
        run: |
          cd sdk
          make defconfig
          make package/zerotier/compile V=s -j$(nproc) || make package/zerotier/compile V=s -j1

      - name: Collect IPK
        run: |
          mkdir -p output
          find sdk/bin/packages -name 'zerotier_*.ipk' -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotier-${{ matrix.arch }}
          path: output/*.ipk

  release:
    name: Create Release
    needs: [build-luci]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: luci-app-zerotier
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          generate_release_notes: true
